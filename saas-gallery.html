    <style>
        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            overflow-x: hidden;
            padding-top: 100px;
        }

        .gallery-nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 2rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, var(--bg-main) 10%, transparent 100%);
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .back-btn:hover {
            color: var(--text-primary);
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .gallery-tag {
            display: inline-block;
            background: var(--accent-light);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent);
            border: 1px solid var(--accent-light);
            margin-bottom: 1.5rem;
        }

        .gallery-title {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 1rem;
        }

        .gallery-subtitle {
            color: var(--text-secondary);
            font-size: 20px;
            font-weight: 300;
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
            display: flex;
            flex-direction: column;
            gap: 4rem;
            padding-bottom: 8rem;
        }

        .gallery-image-wrapper {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            box-shadow: 0 40px 80px rgba(0,0,0,0.08);
            transition: transform 0.6s var(--ease-premium), box-shadow 0.6s ease, border-color 0.6s ease;
        }

        .gallery-image-wrapper:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 60px 100px rgba(0,0,0,0.12);
            border-color: var(--accent);
        }

        .gallery-img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        @media (max-width: 768px) {
            body { 
                padding-top: 80px; 
            }
            .gallery-nav { 
                padding: 1rem 5%; 
                background: linear-gradient(to bottom, var(--bg-main) 10%, transparent 100%);
            }
            .gallery-nav img {
                height: 32px !important;
            }
            .back-btn {
                font-size: 13px;
            }
            .gallery-header { 
                margin-bottom: 2.5rem; 
                padding: 0 5%;
            }
            .gallery-tag {
                font-size: 10px;
                padding: 0.4rem 0.8rem;
                margin-bottom: 1rem;
            }
            .gallery-title { 
                font-size: 32px; 
                line-height: 1.15;
                margin-bottom: 0.75rem;
                letter-spacing: -0.01em;
            }
            .gallery-subtitle { 
                font-size: 15px; 
                line-height: 1.5;
            }
            .gallery-container { 
                gap: 2rem;
                padding: 0 1rem;
                padding-bottom: 5rem;
            }
            .gallery-image-wrapper {
                border-radius: 12px;
                box-shadow: 0 20px 40px rgba(0,0,0,0.06);
                border: 1px solid var(--border-color);
            }
            .gallery-image-wrapper:hover {
                transform: none;
                box-shadow: 0 20px 40px rgba(0,0,0,0.06);
                border-color: var(--border-color);
            }
        }
    </style>
</head>
