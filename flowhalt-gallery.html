    <script src="script.js?v=3"></script>
    <script>
        // Intersection Observer to smartly float the right-side Download button when scrolling past header
        const ctaWrapper = document.getElementById('cta-wrapper');
        const sideBtn = document.getElementById('side-floating-btn');
        
        const floatObserver = new IntersectionObserver((entries) => {
            const entry = entries[0];
            // If the wrapper is out of view and we scrolled down past it (boundingClientRect.top < 0)
            if (!entry.isIntersecting && entry.boundingClientRect.top < 0) {
                sideBtn.classList.add('visible');
            } else {
                sideBtn.classList.remove('visible');
            }
        }, { root: null, threshold: 0 });
        
        if (ctaWrapper) {
            floatObserver.observe(ctaWrapper);
        }

        document.getElementById('backToTopBtn').addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
